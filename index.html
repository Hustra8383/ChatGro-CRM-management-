<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Sandboxed iframe window.fetch compatibility patch
      (function() {
        try {
          const nativeFetch = window.fetch;
          let customFetch = nativeFetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return customFetch;
            },
            set(value) {
              customFetch = value;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
